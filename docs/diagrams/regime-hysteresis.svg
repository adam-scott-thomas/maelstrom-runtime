<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#0f1724"/>
    </linearGradient>
    <filter id="g2">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="gr2" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1a2440" stroke-width="0.4"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)"/>
  <rect width="800" height="500" fill="url(#gr2)" opacity="0.3"/>

  <!-- Title -->
  <text x="400" y="40" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">REGIME ARBITRATION &amp; HYSTERESIS</text>
  <text x="400" y="60" font-family="monospace" font-size="10" fill="#556688" text-anchor="middle">r*(t) = argmax_r dP_r/dt — asymmetric inertia, sticky under pressure</text>

  <!-- Y-axis -->
  <line x1="80" y1="90" x2="80" y2="390" stroke="#334466" stroke-width="1"/>
  <text x="30" y="245" font-family="monospace" font-size="10" fill="#556688" text-anchor="middle" transform="rotate(-90,30,245)">REGIME DOMINANCE P_r(t)</text>
  <!-- Y ticks -->
  <line x1="76" y1="120" x2="80" y2="120" stroke="#334466" stroke-width="1"/>
  <text x="70" y="124" font-family="monospace" font-size="8" fill="#445566" text-anchor="end">1.0</text>
  <line x1="76" y1="190" x2="80" y2="190" stroke="#334466" stroke-width="1"/>
  <text x="70" y="194" font-family="monospace" font-size="8" fill="#445566" text-anchor="end">0.7</text>
  <line x1="76" y1="260" x2="80" y2="260" stroke="#334466" stroke-width="1"/>
  <text x="70" y="264" font-family="monospace" font-size="8" fill="#445566" text-anchor="end">0.4</text>
  <line x1="76" y1="330" x2="80" y2="330" stroke="#334466" stroke-width="1"/>
  <text x="70" y="334" font-family="monospace" font-size="8" fill="#445566" text-anchor="end">0.1</text>

  <!-- X-axis -->
  <line x1="80" y1="390" x2="720" y2="390" stroke="#334466" stroke-width="1"/>
  <text x="400" y="415" font-family="monospace" font-size="10" fill="#556688" text-anchor="middle">TIME (ticks) →</text>
  <!-- X ticks -->
  <text x="80" y="405" font-family="monospace" font-size="8" fill="#445566" text-anchor="middle">0</text>
  <text x="240" y="405" font-family="monospace" font-size="8" fill="#445566" text-anchor="middle">200</text>
  <text x="400" y="405" font-family="monospace" font-size="8" fill="#445566" text-anchor="middle">400</text>
  <text x="560" y="405" font-family="monospace" font-size="8" fill="#445566" text-anchor="middle">600</text>
  <text x="720" y="405" font-family="monospace" font-size="8" fill="#445566" text-anchor="middle">800</text>

  <!-- Stress band at bottom -->
  <rect x="80" y="420" width="640" height="20" rx="3" fill="#1a2440" opacity="0.5"/>
  <!-- Stress gradient fill -->
  <rect x="80" y="420" width="160" height="20" rx="3" fill="#1a3322" opacity="0.5"/>
  <rect x="240" y="420" width="160" height="20" fill="#2a3322" opacity="0.5"/>
  <rect x="400" y="420" width="160" height="20" fill="#3a2222" opacity="0.5"/>
  <rect x="560" y="420" width="160" height="20" rx="3" fill="#4a1a1a" opacity="0.5"/>
  <text x="400" y="435" font-family="monospace" font-size="9" fill="#ff3b3b" text-anchor="middle" opacity="0.7">S(t) STRESS LEVEL →</text>

  <!-- Regime bypass threshold line -->
  <line x1="80" y1="150" x2="720" y2="150" stroke="#ff3b3b" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="725" y="154" font-family="monospace" font-size="8" fill="#ff3b3b" opacity="0.5">T_bypass</text>

  <!-- Regime traces -->
  <!-- Peacetime (gray) — dominant early, fades -->
  <polyline points="80,200 120,195 160,200 200,210 240,240 280,280 320,310 360,340 400,355 440,360 480,365 520,365 560,368 600,370 640,372 680,375 720,378"
            fill="none" stroke="#556688" stroke-width="2" opacity="0.5"/>

  <!-- Economic (amber) — rises mid, gets taken over -->
  <polyline points="80,340 120,330 160,310 200,280 240,240 280,210 320,195 360,210 400,250 440,280 480,310 520,330 560,345 600,355 640,360 680,362 720,365"
            fill="none" stroke="#ffaa00" stroke-width="2" filter="url(#g2)"/>

  <!-- Epistemic (blue) — oscillates in middle -->
  <polyline points="80,310 120,300 160,290 200,295 240,275 280,260 320,250 360,240 400,230 440,235 480,240 520,250 560,265 600,280 640,290 680,295 720,300"
            fill="none" stroke="#2a6fff" stroke-width="2" filter="url(#g2)"/>

  <!-- Survival (red) — low early, spikes late under stress -->
  <polyline points="80,370 120,368 160,365 200,360 240,350 280,330 320,300 360,260 400,220 440,180 480,150 520,130 560,120 600,115 640,118 680,120 720,122"
            fill="none" stroke="#ff3b3b" stroke-width="2.5" filter="url(#g2)"/>

  <!-- Moral (green) — steady, slight bump -->
  <polyline points="80,320 120,315 160,310 200,305 240,295 280,285 320,280 360,275 400,270 440,265 480,260 520,262 560,268 600,275 640,280 680,285 720,288"
            fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>

  <!-- Regime flip annotation -->
  <line x1="320" y1="90" x2="320" y2="390" stroke="#ffaa00" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="325" y="100" font-family="monospace" font-size="9" fill="#ffaa00" opacity="0.6">Economic peaks</text>

  <line x1="480" y1="90" x2="480" y2="390" stroke="#ff3b3b" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="485" y="100" font-family="monospace" font-size="9" fill="#ff3b3b" opacity="0.6">Survival crosses T_bypass</text>

  <!-- Hysteresis annotation -->
  <rect x="540" y="90" width="180" height="55" rx="5" fill="#0f1724" stroke="#334466" stroke-width="1" opacity="0.9"/>
  <text x="550" y="107" font-family="monospace" font-size="9" fill="#556688">HYSTERESIS INERTIA:</text>
  <text x="550" y="122" font-family="monospace" font-size="9" fill="#00c8ff">T_up = 0.15  (harder to gain)</text>
  <text x="550" y="137" font-family="monospace" font-size="9" fill="#ff6b35">T_dn = 0.05  (easy to lose)</text>

  <!-- Legend -->
  <rect x="85" y="88" width="140" height="108" rx="5" fill="#0a0e17" stroke="#1a2440" stroke-width="1" opacity="0.95"/>
  <line x1="95" y1="105" x2="115" y2="105" stroke="#ff3b3b" stroke-width="2.5"/>
  <text x="120" y="109" font-family="monospace" font-size="9" fill="#ff3b3b">Survival</text>
  <line x1="95" y1="123" x2="115" y2="123" stroke="#ffaa00" stroke-width="2"/>
  <text x="120" y="127" font-family="monospace" font-size="9" fill="#ffaa00">Economic</text>
  <line x1="95" y1="141" x2="115" y2="141" stroke="#2a6fff" stroke-width="2"/>
  <text x="120" y="145" font-family="monospace" font-size="9" fill="#2a6fff">Epistemic</text>
  <line x1="95" y1="159" x2="115" y2="159" stroke="#00ff88" stroke-width="1.5"/>
  <text x="120" y="163" font-family="monospace" font-size="9" fill="#00ff88">Moral</text>
  <line x1="95" y1="177" x2="115" y2="177" stroke="#556688" stroke-width="2"/>
  <text x="120" y="181" font-family="monospace" font-size="9" fill="#556688">Peacetime</text>

  <!-- Bottom border -->
  <rect x="0" y="497" width="800" height="3" fill="#ff3b3b" opacity="0.2"/>
</svg>